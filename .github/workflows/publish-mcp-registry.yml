name: Publish to MCP Registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (semver, without leading v)"
        required: true

permissions:
  contents: read
  id-token: write  # required for mcp-publisher github-oidc auth

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync server.json version with release
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          jq --arg v "$VERSION" \
            '.version = $v | .packages[0].version = $v' \
            server.json > server.json.tmp && mv server.json.tmp server.json
          cat server.json

      - name: Wait for PyPI to serve the new version
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/nveil/${VERSION}/json" > /dev/null; then
              echo "PyPI is serving nveil==${VERSION}"
              exit 0
            fi
            echo "Attempt $i/30: PyPI not yet serving nveil==${VERSION}, sleeping 20s"
            sleep 20
          done
          echo "Timed out waiting for PyPI"
          exit 1

      - name: Install mcp-publisher
        run: |
          VERSION=v1.5.0
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin mcp-publisher
          mcp-publisher --help

      - name: Authenticate via GitHub Actions OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP registry
        run: mcp-publisher publish
