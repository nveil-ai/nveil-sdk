name: Bug Report
description: Report a bug in the NVEIL SDK
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or tracebacks.
      render: shell

  - type: input
    id: version
    attributes:
      label: SDK Version
      description: "Run: python -c \"import nveil; print(nveil.__version__)\""
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12.3"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14.5, Ubuntu 22.04, Windows 11"
